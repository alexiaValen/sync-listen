<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sync Listen</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 480px;
    margin: 60px auto;
    padding: 0 20px;
    color: #222;
  }
  h1 { font-size: 1.4rem; }
  input[type=text] {
    width: 100%;
    padding: 8px;
    box-sizing: border-box;
    margin-bottom: 10px;
  }
  button {
    padding: 8px 14px;
    margin-right: 8px;
    cursor: pointer;
  }
  audio { width: 100%; margin-top: 16px; }
  #status { margin-top: 14px; font-size: 0.9rem; color: #666; }
  hr { margin: 28px 0; border: none; border-top: 1px solid #eee; }
  .roster-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .roster-item img { width: 40px; height: 40px; border-radius: 4px; }
  .roster-name { font-weight: 600; font-size: 0.9rem; }
  .roster-track { font-size: 0.85rem; color: #555; }
  .roster-empty { font-size: 0.85rem; color: #999; }
  .roster-play-link { font-size: 0.8rem; color: #1DB954; text-decoration: none; }
  .roster-play-link:hover { text-decoration: underline; }
  #spotifyBtn {
    background: #1DB954;
    color: white;
    border: none;
    border-radius: 4px;
  }
</style>
</head>
<body>
  <h1>🎧 Sync Listen</h1>
  <p>Paste a direct audio URL (mp3/m4a) and load it. Anyone else on this page (same server) hears it in sync — no Bluetooth needed.</p>

  <input id="trackUrl" type="text" placeholder="https://example.com/song.mp3" />
  <button id="loadBtn">Load track</button>

  <audio id="player" controls></audio>

  <div id="status">Connecting…</div>

  <hr />

  <h2 style="font-size: 1.1rem;">Now playing on Spotify</h2>
  <p style="font-size: 0.9rem; color: #666;">Connect Spotify to share what you're listening to with everyone on this page (read-only — no playback control).</p>
  <button id="spotifyBtn">Connect Spotify</button>
  <div id="roster"></div>

<script>
  const player = document.getElementById("player");
  const trackUrlInput = document.getElementById("trackUrl");
  const loadBtn = document.getElementById("loadBtn");
  const statusEl = document.getElementById("status");

  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}`);

  let applyingRemote = false; // guard against feedback loops
  const DRIFT_TOLERANCE = 0.35; // seconds

  ws.onopen = () => { statusEl.textContent = "Connected. Waiting for a track…"; };
  ws.onclose = () => { statusEl.textContent = "Disconnected. Refresh to reconnect."; };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type !== "state") return;

    applyingRemote = true;

    if (msg.trackUrl && player.src !== msg.trackUrl) {
      player.src = msg.trackUrl;
      trackUrlInput.value = msg.trackUrl;
    }

    // Estimate elapsed time since the event was sent, so latecomers/playing clients catch up.
    const elapsed = msg.action === "play" ? (Date.now() - msg.updatedAt) / 1000 : 0;
    const targetTime = msg.time + elapsed;

    if (Math.abs(player.currentTime - targetTime) > DRIFT_TOLERANCE) {
      player.currentTime = targetTime;
    }

    if (msg.action === "play" && player.paused) {
      player.play().catch(() => {});
    } else if (msg.action === "pause" && !player.paused) {
      player.pause();
    }

    statusEl.textContent = msg.trackUrl ? "In sync." : "Waiting for a track…";
    setTimeout(() => { applyingRemote = false; }, 50);
  };

  loadBtn.onclick = () => {
    const url = trackUrlInput.value.trim();
    if (!url) return;
    ws.send(JSON.stringify({ type: "track", url }));
  };

  player.addEventListener("play", () => {
    if (applyingRemote) return;
    ws.send(JSON.stringify({ type: "play", time: player.currentTime }));
  });

  player.addEventListener("pause", () => {
    if (applyingRemote) return;
    ws.send(JSON.stringify({ type: "pause", time: player.currentTime }));
  });

  player.addEventListener("seeked", () => {
    if (applyingRemote) return;
    ws.send(JSON.stringify({ type: "seek", time: player.currentTime }));
  });

  // --- Spotify "now playing" sharing ---------------------------------

  const spotifyBtn = document.getElementById("spotifyBtn");
  const rosterEl = document.getElementById("roster");

  spotifyBtn.onclick = () => { location.href = "/login"; };

  async function pollNowPlaying() {
    try {
      const res = await fetch("/me/now-playing");
      const data = await res.json();

      if (!data.loggedIn) {
        spotifyBtn.textContent = "Connect Spotify";
        spotifyBtn.onclick = () => { location.href = "/login"; };
        return;
      }

      spotifyBtn.textContent = "Spotify connected ✓";
      spotifyBtn.onclick = () => { location.href = "/logout"; };

      ws.send(JSON.stringify({
        type: "nowPlaying",
        displayName: data.displayName,
        playing: data.playing,
      }));
    } catch {
      // network hiccup, try again next tick
    }
  }

  pollNowPlaying();
  setInterval(pollNowPlaying, 5000);

  function renderRoster(listeners) {
    const entries = Object.values(listeners);
    if (entries.length === 0) {
      rosterEl.innerHTML = '<div class="roster-empty">No one has connected Spotify yet.</div>';
      return;
    }
    rosterEl.innerHTML = entries.map((l) => {
      if (!l.playing) {
        return `<div class="roster-item">
          <div>
            <div class="roster-name">${escapeHtml(l.displayName)}</div>
            <div class="roster-track">Not playing anything right now</div>
          </div>
        </div>`;
      }
      const p = l.playing;
      return `<div class="roster-item">
        ${p.albumArt ? `<img src="${escapeHtml(p.albumArt)}" alt="" />` : ""}
        <div>
          <div class="roster-name">${escapeHtml(l.displayName)}</div>
          <div class="roster-track">${p.isPlaying ? "▶" : "⏸"} ${escapeHtml(p.name)} — ${escapeHtml(p.artist || "")}</div>
          ${p.url ? `<a href="${escapeHtml(p.url)}" target="_blank" rel="noopener" class="roster-play-link">Play this on Spotify ↗</a>` : ""}
        </div>
      </div>`;
    }).join("");
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]));
  }

  const originalOnMessage = ws.onmessage;
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === "nowPlayingRoster") {
      renderRoster(msg.listeners);
      return;
    }
    originalOnMessage(event);
  };
</script>
</body>
</html>
